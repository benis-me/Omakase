name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck (all packages)
        run: bun run typecheck:all

      - name: Test
        run: bun test
